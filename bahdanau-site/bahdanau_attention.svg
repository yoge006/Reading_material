<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="780" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Bahdanau Attention: Alignment Matrix Formation</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555">Soft alignment matrix between source (encoder) and target (decoder) sequences</text>
  
  <!-- === ENCODER SECTION === -->
  <text x="80" y="100" font-size="15" font-weight="bold" fill="#2c5282">Encoder Hidden States (Source)</text>
  
  <!-- Encoder states h1-h4 -->
  <g>
    <rect x="80" y="115" width="60" height="45" fill="#bee3f8" stroke="#2c5282" stroke-width="2" rx="5"/>
    <text x="110" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d">h₁</text>
    
    <rect x="150" y="115" width="60" height="45" fill="#bee3f8" stroke="#2c5282" stroke-width="2" rx="5"/>
    <text x="180" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d">h₂</text>
    
    <rect x="220" y="115" width="60" height="45" fill="#bee3f8" stroke="#2c5282" stroke-width="2" rx="5"/>
    <text x="250" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d">h₃</text>
    
    <rect x="290" y="115" width="60" height="45" fill="#bee3f8" stroke="#2c5282" stroke-width="2" rx="5"/>
    <text x="320" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d">h₄</text>
  </g>
  
  <text x="80" y="180" font-size="11" fill="#555" font-style="italic">"I"</text>
  <text x="150" y="180" font-size="11" fill="#555" font-style="italic">"love"</text>
  <text x="220" y="180" font-size="11" fill="#555" font-style="italic">"deep"</text>
  <text x="290" y="180" font-size="11" fill="#555" font-style="italic">"learning"</text>
  
  <!-- === DECODER SECTION === -->
  <text x="600" y="100" font-size="15" font-weight="bold" fill="#742a2a">Decoder States (Target)</text>
  
  <g>
    <rect x="600" y="115" width="70" height="45" fill="#fed7d7" stroke="#742a2a" stroke-width="2" rx="5"/>
    <text x="635" y="143" text-anchor="middle" font-size="15" font-weight="bold" fill="#742a2a">s₁</text>
    
    <rect x="680" y="115" width="70" height="45" fill="#fed7d7" stroke="#742a2a" stroke-width="2" rx="5"/>
    <text x="715" y="143" text-anchor="middle" font-size="15" font-weight="bold" fill="#742a2a">s₂</text>
    
    <rect x="760" y="115" width="70" height="45" fill="#fed7d7" stroke="#742a2a" stroke-width="2" rx="5"/>
    <text x="795" y="143" text-anchor="middle" font-size="15" font-weight="bold" fill="#742a2a">s₃</text>
  </g>
  
  <text x="600" y="180" font-size="11" fill="#555" font-style="italic">"J'"</text>
  <text x="680" y="180" font-size="11" fill="#555" font-style="italic">"adore"</text>
  <text x="760" y="180" font-size="11" fill="#555" font-style="italic">"l'IA"</text>
  
  <!-- === SCORE COMPUTATION === -->
  <rect x="250" y="210" width="400" height="70" fill="#fefcbf" stroke="#b7791f" stroke-width="2" rx="8"/>
  <text x="450" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#744210">Score Function (Additive)</text>
  <text x="450" y="260" text-anchor="middle" font-size="15" fill="#744210" font-family="Georgia, serif">e(t,i) = vᵀ · tanh(W₁·hᵢ + W₂·s_{t-1})</text>
  
  <!-- Arrow from encoder to score -->
  <line x1="210" y1="165" x2="300" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow from decoder to score -->
  <line x1="680" y1="165" x2="600" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c53030"/>
    </marker>
  </defs>
  
  <!-- === SCORE MATRIX === -->
  <text x="150" y="320" font-size="14" font-weight="bold" fill="#1a1a1a">(1) Score Matrix  e  — shape (T_dec × T_enc)</text>
  
  <!-- Column headers (encoder positions) -->
  <text x="170" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₁</text>
  <text x="220" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₂</text>
  <text x="270" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₃</text>
  <text x="320" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₄</text>
  
  <!-- Row labels (decoder positions) -->
  <text x="130" y="375" text-anchor="end" font-size="11" fill="#742a2a" font-weight="bold">s₁ →</text>
  <text x="130" y="405" text-anchor="end" font-size="11" fill="#742a2a" font-weight="bold">s₂ →</text>
  <text x="130" y="435" text-anchor="end" font-size="11" fill="#742a2a" font-weight="bold">s₃ →</text>
  
  <!-- Score matrix cells -->
  <g stroke="#333" stroke-width="1.5" fill="#fff">
    <rect x="145" y="360" width="50" height="25"/>
    <rect x="195" y="360" width="50" height="25"/>
    <rect x="245" y="360" width="50" height="25"/>
    <rect x="295" y="360" width="50" height="25"/>
    
    <rect x="145" y="385" width="50" height="25"/>
    <rect x="195" y="385" width="50" height="25"/>
    <rect x="245" y="385" width="50" height="25"/>
    <rect x="295" y="385" width="50" height="25"/>
    
    <rect x="145" y="410" width="50" height="25"/>
    <rect x="195" y="410" width="50" height="25"/>
    <rect x="245" y="410" width="50" height="25"/>
    <rect x="295" y="410" width="50" height="25"/>
  </g>
  
  <!-- Score values -->
  <g font-size="11" text-anchor="middle" fill="#333">
    <text x="170" y="377">2.1</text><text x="220" y="377">0.3</text><text x="270" y="377">-1.2</text><text x="320" y="377">0.5</text>
    <text x="170" y="402">0.4</text><text x="220" y="402">2.8</text><text x="270" y="402">0.1</text><text x="320" y="402">-0.3</text>
    <text x="170" y="427">-0.8</text><text x="220" y="427">0.2</text><text x="270" y="427">1.9</text><text x="320" y="427">2.4</text>
  </g>
  
  <text x="245" y="460" text-anchor="middle" font-size="11" fill="#555" font-style="italic">raw alignment scores (unnormalized)</text>
  
  <!-- Arrow to softmax -->
  <line x1="360" y1="395" x2="430" y2="395" stroke="#c53030" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="395" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#c53030">softmax</text>
  <text x="395" y="415" text-anchor="middle" font-size="10" fill="#555">(per row)</text>
  
  <!-- === ATTENTION WEIGHT MATRIX === -->
  <text x="460" y="320" font-size="14" font-weight="bold" fill="#1a1a1a">(2) Attention Weight Matrix  α  (row-stochastic)</text>
  
  <!-- Column headers -->
  <text x="470" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₁</text>
  <text x="520" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₂</text>
  <text x="570" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₃</text>
  <text x="620" y="350" text-anchor="middle" font-size="11" fill="#2c5282" font-weight="bold">h₄</text>
  <text x="680" y="350" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Σ</text>
  
  <!-- Attention heatmap cells -->
  <g stroke="#333" stroke-width="1.5">
    <!-- Row 1: s1 -> attends mostly to h1 -->
    <rect x="445" y="360" width="50" height="25" fill="#2b6cb0" opacity="0.9"/>
    <rect x="495" y="360" width="50" height="25" fill="#2b6cb0" opacity="0.15"/>
    <rect x="545" y="360" width="50" height="25" fill="#2b6cb0" opacity="0.05"/>
    <rect x="595" y="360" width="50" height="25" fill="#2b6cb0" opacity="0.2"/>
    
    <!-- Row 2: s2 -> attends mostly to h2 -->
    <rect x="445" y="385" width="50" height="25" fill="#2b6cb0" opacity="0.15"/>
    <rect x="495" y="385" width="50" height="25" fill="#2b6cb0" opacity="0.95"/>
    <rect x="545" y="385" width="50" height="25" fill="#2b6cb0" opacity="0.1"/>
    <rect x="595" y="385" width="50" height="25" fill="#2b6cb0" opacity="0.08"/>
    
    <!-- Row 3: s3 -> split between h3 and h4 -->
    <rect x="445" y="410" width="50" height="25" fill="#2b6cb0" opacity="0.05"/>
    <rect x="495" y="410" width="50" height="25" fill="#2b6cb0" opacity="0.1"/>
    <rect x="545" y="410" width="50" height="25" fill="#2b6cb0" opacity="0.45"/>
    <rect x="595" y="410" width="50" height="25" fill="#2b6cb0" opacity="0.6"/>
  </g>
  
  <!-- Attention values -->
  <g font-size="10" text-anchor="middle" font-weight="bold">
    <text x="470" y="377" fill="white">0.78</text>
    <text x="520" y="377" fill="#333">0.11</text>
    <text x="570" y="377" fill="#333">0.03</text>
    <text x="620" y="377" fill="#333">0.08</text>
    <text x="680" y="377" fill="#555">1.00</text>
    
    <text x="470" y="402" fill="#333">0.06</text>
    <text x="520" y="402" fill="white">0.85</text>
    <text x="570" y="402" fill="#333">0.05</text>
    <text x="620" y="402" fill="#333">0.04</text>
    <text x="680" y="402" fill="#555">1.00</text>
    
    <text x="470" y="427" fill="#333">0.04</text>
    <text x="520" y="427" fill="#333">0.08</text>
    <text x="570" y="427" fill="#333">0.40</text>
    <text x="620" y="427" fill="white">0.48</text>
    <text x="680" y="427" fill="#555">1.00</text>
  </g>
  
  <text x="545" y="460" text-anchor="middle" font-size="11" fill="#555" font-style="italic">each row sums to 1 (probability distribution)</text>
  
  <!-- === CONTEXT VECTOR === -->
  <rect x="150" y="500" width="600" height="90" fill="#e6fffa" stroke="#285e61" stroke-width="2" rx="8"/>
  <text x="450" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#234e52">(3) Context Vector for each decoder step</text>
  <text x="450" y="552" text-anchor="middle" font-size="15" fill="#234e52" font-family="Georgia, serif">c_t = Σᵢ α(t, i) · hᵢ</text>
  <text x="450" y="575" text-anchor="middle" font-size="11" fill="#285e61" font-style="italic">weighted sum of encoder states, guided by the attention row</text>
  
  <!-- === KEY TAKEAWAY === -->
  <rect x="80" y="615" width="740" height="145" fill="#fff5f5" stroke="#c53030" stroke-width="2" rx="8"/>
  <text x="450" y="640" text-anchor="middle" font-size="14" font-weight="bold" fill="#742a2a">Matrix Types Formed</text>
  
  <text x="100" y="665" font-size="12" fill="#1a1a1a"><tspan font-weight="bold">• Score matrix (e):</tspan>  shape (T_dec × T_enc), real-valued, unbounded</text>
  <text x="100" y="685" font-size="12" fill="#1a1a1a"><tspan font-weight="bold">• Attention matrix (α):</tspan>  shape (T_dec × T_enc), row-stochastic (rows sum to 1, values in [0, 1])</text>
  <text x="100" y="705" font-size="12" fill="#1a1a1a"><tspan font-weight="bold">• Interpretation:</tspan>  a soft alignment matrix — "soft" version of a permutation matrix</text>
  <text x="100" y="725" font-size="12" fill="#1a1a1a"><tspan font-weight="bold">• Dense, not sparse:</tspan>  unlike hard alignment, every cell has a non-zero probability</text>
  <text x="100" y="745" font-size="12" fill="#1a1a1a"><tspan font-weight="bold">• Learned end-to-end:</tspan>  via W₁, W₂, v during seq2seq training</text>
</svg>
